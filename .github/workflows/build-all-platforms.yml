name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-all-platforms-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG 与 package.json 版本 $PKG 不一致"
            exit 1
          fi

  build-macos:
    name: Build macOS Universal
    needs: typecheck
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Universal
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac dmg zip --universal --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hookbuddy-macos-universal
          path: |
            dist/*.dmg
            dist/*-mac.zip
            dist/*.zip
            dist/latest-mac.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows x64
    needs: typecheck
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows x64
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hookbuddy-windows-x64
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux x64
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build Linux x64
        # AppImage + deb；snap 需额外 snapcraft，CI 上易失败，先不产出
        run: pnpm exec electron-vite build && pnpm exec electron-builder --linux AppImage deb --x64 --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hookbuddy-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 14
